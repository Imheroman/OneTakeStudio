spring:
  application:
    name: media-service

  # MySQL Database
  datasource:
    url: jdbc:mysql://localhost:3306/media_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: media_user
    password: media_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update  # 개발: update, 운영: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # Redis (Streams 포함)
  data:
    redis:
      host: localhost
      port: 6379

# Server
server:
  port: 8082

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# LiveKit
livekit:
  host: http://localhost:7880
  api:
    key: devkey
    secret: secret
  egress:
    output-path: /recordings/

# Core Service (송출 채널 정보 조회)
core:
  service:
    url: http://localhost:8080

# Recording Storage
# Docker Egress는 /recordings에 저장 → 로컬 ./recordings 폴더와 볼륨 연결됨
recording:
  storage:
    base-path: ${RECORDING_BASE_PATH:./recordings}
    base-url: ${RECORDING_BASE_URL:http://localhost:8082/api/media/record/files}

# Logging
logging:
  level:
    com.onetake.media: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
