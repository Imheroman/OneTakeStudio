spring:
  application:
    name: media-service

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://localhost:5432/media_db
    username: media_user
    password: media_password
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update  # 개발: update, 운영: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # Redis (Streams 포함)
  data:
    redis:
      host: localhost
      port: 6379

# Server
server:
  port: 8082

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# LiveKit
livekit:
  host: http://localhost:7880
  api:
    key: devkey
    secret: secret

# AWS S3
aws:
  s3:
    bucket: onetakestudio-media
    region: ap-northeast-2
  access-key-id: ${AWS_ACCESS_KEY_ID:your-access-key}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:your-secret-key}

# Logging
logging:
  level:
    com.onetake.media: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
