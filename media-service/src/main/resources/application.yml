server:
  port: 8082

spring:
  application:
    name: media-service

  # MySQL Database
  datasource:
    url: jdbc:mysql://localhost:3306/media_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: media_user
    password: media_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

# JWT
jwt:
  secret: b25ldGFrZXN0dWRpby1qd3Qtc2VjcmV0LWtleS1mb3ItaHMyNTYtYWxnb3JpdGhtLW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# LiveKit
livekit:
  host: http://localhost:7880
  api:
    key: devkey
    secret: devkey-secret-for-livekit-min-32-chars
  egress:
    output-path: /recordings/

# Core Service
core:
  service:
    url: http://localhost:8080

# Recording Storage
recording:
  storage:
    base-path: ./recordings
    base-url: http://localhost:8082/api/media/record/files

# Logging
logging:
  level:
    com.onetake.media: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
