server:
  port: 8082

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: media-service

  # MySQL Database
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/media_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:media_user}
    password: ${DB_PASSWORD:media_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT
jwt:
  secret: ${JWT_SECRET:b25ldGFrZXN0dWRpby1qd3Qtc2VjcmV0LWtleS1mb3ItaHMyNTYtYWxnb3JpdGhtLW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# LiveKit
livekit:
  host: ${LIVEKIT_HOST:http://localhost:7880}
  api:
    key: ${LIVEKIT_API_KEY:devkey}
    secret: ${LIVEKIT_API_SECRET:devkey-secret-for-livekit-min-32-chars}
  egress:
    output-path: /recordings/

# Core Service
core:
  service:
    url: ${CORE_SERVICE_URL:http://localhost:8080}

# Recording Storage
recording:
  storage:
    base-path: ${RECORDING_BASE_PATH:./recordings}
    base-url: ${RECORDING_BASE_URL:http://localhost:8082/api/media/record/files}

# Logging
logging:
  level:
    com.onetake.media: ${LOG_LEVEL:DEBUG}
    org.springframework.web: INFO
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}
