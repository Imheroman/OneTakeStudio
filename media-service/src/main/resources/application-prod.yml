# =====================================================
# Production Configuration - media-service
# 운영 환경에서 환경변수로 오버라이드
# =====================================================

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    enabled: false

livekit:
  host: ${LIVEKIT_HOST}
  api:
    key: ${LIVEKIT_API_KEY}
    secret: ${LIVEKIT_API_SECRET}

core:
  service:
    url: ${CORE_SERVICE_URL}

recording:
  storage:
    base-path: ${RECORDING_BASE_PATH}
    base-url: ${RECORDING_BASE_URL}

# External EC2 Upload (청크 업로드)
external:
  upload:
    enabled: ${EXTERNAL_UPLOAD_ENABLED:false}
    server-url: ${EXTERNAL_UPLOAD_URL}
    api-key: ${EXTERNAL_UPLOAD_API_KEY}
    timeout: ${EXTERNAL_UPLOAD_TIMEOUT:300000}
    chunk-size: ${EXTERNAL_UPLOAD_CHUNK_SIZE:52428800}
    max-retries: ${EXTERNAL_UPLOAD_MAX_RETRIES:3}
    retry-delay: ${EXTERNAL_UPLOAD_RETRY_DELAY:1000}

logging:
  level:
    com.onetake.media: INFO
    org.hibernate.SQL: WARN
