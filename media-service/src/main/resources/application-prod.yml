# =====================================================
# Production Configuration - media-service
# =====================================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.onetake.media: INFO
    org.hibernate.SQL: WARN

# 운영 환경에서 필요한 환경변수 목록:
# -----------------------------------------------------
# DB_URL                - MySQL 연결 URL
# DB_USERNAME           - DB 사용자명
# DB_PASSWORD           - DB 비밀번호
# REDIS_HOST            - Redis 호스트
# REDIS_PORT            - Redis 포트
# JWT_SECRET            - JWT 시크릿 키 (core-service와 동일)
# EUREKA_URL            - Eureka 서버 URL
# LIVEKIT_HOST          - LiveKit 서버 URL
# LIVEKIT_API_KEY       - LiveKit API Key
# LIVEKIT_API_SECRET    - LiveKit API Secret
# CORE_SERVICE_URL      - Core 서비스 URL
# RECORDING_BASE_PATH   - 녹화 파일 저장 경로
# RECORDING_BASE_URL    - 녹화 파일 접근 URL
# -----------------------------------------------------
