<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth API Test</title>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 900px; margin: 0 auto; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
        h2 { margin-top: 0; background: #333; color: #fff; padding: 8px; margin: -15px -15px 15px; }
        input, button { padding: 8px; margin: 5px 0; }
        input { width: 250px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; }
        button:hover { background: #0056b3; }
        .response { background: #f4f4f4; padding: 10px; margin-top: 10px; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
        .success { border-left: 4px solid green; }
        .error { border-left: 4px solid red; }
        .token-display { background: #fffbe6; padding: 10px; margin: 10px 0; word-break: break-all; }
        label { display: inline-block; width: 100px; }
    </style>
</head>
<body>
    <h1>OneTake Auth API Test</h1>
    <p>Base URL: <input type="text" id="baseUrl" value="http://localhost:8080" style="width: 200px;"></p>

    <!-- 아이디 중복 확인 -->
    <div class="section">
        <h2>1. Check Username</h2>
        <label>Username:</label>
        <input type="text" id="checkUsername" placeholder="username">
        <button onclick="checkUsername()">Check</button>
        <div id="checkUsernameResult" class="response"></div>
    </div>

    <!-- 회원가입 -->
    <div class="section">
        <h2>2. Register</h2>
        <div><label>Username:</label><input type="text" id="regUsername" placeholder="4-20자 영문,숫자,_"></div>
        <div><label>Password:</label><input type="password" id="regPassword" placeholder="8자 이상"></div>
        <div><label>Nickname:</label><input type="text" id="regNickname" placeholder="2-20자"></div>
        <button onclick="register()">Register</button>
        <div id="registerResult" class="response"></div>
    </div>

    <!-- 로그인 -->
    <div class="section">
        <h2>3. Login</h2>
        <div><label>Username:</label><input type="text" id="loginUsername" placeholder="username"></div>
        <div><label>Password:</label><input type="password" id="loginPassword" placeholder="password"></div>
        <button onclick="login()">Login</button>
        <div id="loginResult" class="response"></div>
    </div>

    <!-- 현재 토큰 -->
    <div class="section">
        <h2>4. Current Tokens</h2>
        <div class="token-display">
            <strong>Access Token:</strong><br>
            <span id="currentAccessToken">-</span>
        </div>
        <div class="token-display">
            <strong>Refresh Token:</strong><br>
            <span id="currentRefreshToken">-</span>
        </div>
        <div class="token-display">
            <strong>User Info:</strong><br>
            <span id="currentUserInfo">-</span>
        </div>
        <button onclick="decodeToken()">Decode Access Token</button>
        <button onclick="clearTokens()">Clear Tokens</button>
        <div id="decodeResult" class="response"></div>
    </div>

    <!-- 토큰 갱신 -->
    <div class="section">
        <h2>5. Refresh Token</h2>
        <button onclick="refreshToken()">Refresh Access Token</button>
        <div id="refreshResult" class="response"></div>
    </div>

    <!-- 인증 테스트 -->
    <div class="section">
        <h2>6. Test Protected API</h2>
        <div><label>Method:</label>
            <select id="testMethod" style="padding: 8px;">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="DELETE">DELETE</option>
            </select>
        </div>
        <div><label>Endpoint:</label><input type="text" id="testEndpoint" placeholder="/api/..." style="width: 300px;"></div>
        <div><label>Body:</label><textarea id="testBody" placeholder='{"key": "value"}' style="width: 300px; height: 60px;"></textarea></div>
        <button onclick="testApi()">Send Request</button>
        <div id="testApiResult" class="response"></div>
    </div>

    <script>
        let accessToken = '';
        let refreshTokenValue = '';

        function getBaseUrl() {
            return document.getElementById('baseUrl').value;
        }

        function showResult(elementId, data, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = JSON.stringify(data, null, 2);
            el.className = 'response ' + (isSuccess ? 'success' : 'error');
        }

        async function checkUsername() {
            const username = document.getElementById('checkUsername').value;
            try {
                const res = await fetch(`${getBaseUrl()}/api/auth/check-username?username=${username}`);
                const data = await res.json();
                showResult('checkUsernameResult', data, data.success);
            } catch (e) {
                showResult('checkUsernameResult', { error: e.message }, false);
            }
        }

        async function register() {
            const body = {
                username: document.getElementById('regUsername').value,
                password: document.getElementById('regPassword').value,
                nickname: document.getElementById('regNickname').value
            };
            try {
                const res = await fetch(`${getBaseUrl()}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                showResult('registerResult', data, data.success);
            } catch (e) {
                showResult('registerResult', { error: e.message }, false);
            }
        }

        async function login() {
            const body = {
                username: document.getElementById('loginUsername').value,
                password: document.getElementById('loginPassword').value
            };
            try {
                const res = await fetch(`${getBaseUrl()}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                showResult('loginResult', data, data.success);

                if (data.success && data.data) {
                    accessToken = data.data.accessToken;
                    refreshTokenValue = data.data.refreshToken;
                    updateTokenDisplay(data.data);
                }
            } catch (e) {
                showResult('loginResult', { error: e.message }, false);
            }
        }

        function updateTokenDisplay(data) {
            document.getElementById('currentAccessToken').textContent = accessToken || '-';
            document.getElementById('currentRefreshToken').textContent = refreshTokenValue || '-';
            if (data && data.user) {
                document.getElementById('currentUserInfo').textContent = JSON.stringify(data.user, null, 2);
            }
        }

        function decodeToken() {
            if (!accessToken) {
                showResult('decodeResult', { error: 'No access token' }, false);
                return;
            }
            try {
                const parts = accessToken.split('.');
                const payload = JSON.parse(atob(parts[1]));
                payload.iat_readable = new Date(payload.iat * 1000).toLocaleString();
                payload.exp_readable = new Date(payload.exp * 1000).toLocaleString();
                showResult('decodeResult', payload, true);
            } catch (e) {
                showResult('decodeResult', { error: e.message }, false);
            }
        }

        function clearTokens() {
            accessToken = '';
            refreshTokenValue = '';
            document.getElementById('currentAccessToken').textContent = '-';
            document.getElementById('currentRefreshToken').textContent = '-';
            document.getElementById('currentUserInfo').textContent = '-';
            document.getElementById('decodeResult').textContent = '';
        }

        async function refreshToken() {
            if (!refreshTokenValue) {
                showResult('refreshResult', { error: 'No refresh token. Login first.' }, false);
                return;
            }
            try {
                const res = await fetch(`${getBaseUrl()}/api/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken: refreshTokenValue })
                });
                const data = await res.json();
                showResult('refreshResult', data, data.success);

                if (data.success && data.data) {
                    accessToken = data.data.accessToken;
                    document.getElementById('currentAccessToken').textContent = accessToken;
                }
            } catch (e) {
                showResult('refreshResult', { error: e.message }, false);
            }
        }

        async function testApi() {
            const method = document.getElementById('testMethod').value;
            const endpoint = document.getElementById('testEndpoint').value;
            const bodyText = document.getElementById('testBody').value;

            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            if (accessToken) {
                options.headers['Authorization'] = 'Bearer ' + accessToken;
            }

            if (bodyText && (method === 'POST' || method === 'PUT')) {
                try {
                    options.body = JSON.stringify(JSON.parse(bodyText));
                } catch (e) {
                    options.body = bodyText;
                }
            }

            try {
                const res = await fetch(getBaseUrl() + endpoint, options);
                const data = await res.json();
                showResult('testApiResult', { status: res.status, data: data }, res.ok);
            } catch (e) {
                showResult('testApiResult', { error: e.message }, false);
            }
        }
    </script>
</body>
</html>
