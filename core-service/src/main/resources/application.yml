    client-id: ${OAUTH_GOOGLE_CLIENT_ID:51683382309-340jprf00qpfjggfv5jphuifk5jk1np0.apps.googleusercontent.com}
    client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET: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}
    redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:http://localhost:3000/oauth/callback}
  kakao:
    client-id: ${OAUTH_KAKAO_CLIENT_ID:42b37ce2a41ca38644fa194c0b3d86bd}
