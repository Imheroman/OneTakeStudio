# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# AI Service
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
  webhook:
    url: ${AI_WEBHOOK_URL:http://localhost:8080/api/ai/webhook}

# Media Service
media:
  service:
    url: ${MEDIA_SERVICE_URL:http://localhost:8082}

# FFmpeg
