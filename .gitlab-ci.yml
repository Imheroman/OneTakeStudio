stages:
  - setup        # Secret, ConfigMap 생성
  - build        # 앱 빌드
  - docker       # 이미지 빌드 & 푸시
  - deploy       # 배포

variables:
  CORE_IMAGE: $CI_REGISTRY_IMAGE/core
  MEDIA_IMAGE: $CI_REGISTRY_IMAGE/media

# ─────────────────────────────────────────────
# Stage 1: Kubernetes Secret 생성
# ─────────────────────────────────────────────
setup-secrets:
  stage: setup
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
  script:
    # ═══════════════════════════════════════════
    # Namespace 생성
    # ═══════════════════════════════════════════
    - kubectl create namespace database --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create namespace media --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create namespace core --dry-run=client -o yaml | kubectl apply -f -

    # ═══════════════════════════════════════════
    # MySQL Root Secret (database namespace)
    # ═══════════════════════════════════════════
    - |
      kubectl create secret generic mysql-secret \
        --namespace=database \
        --from-literal=root-password="$MYSQL_ROOT_PASSWORD" \
        --from-literal=media-password="$MEDIA_DB_PASSWORD" \
        --from-literal=core-password="$CORE_DB_PASSWORD" \
        --dry-run=client -o yaml | kubectl apply -f -

    # ═══════════════════════════════════════════
    # Media 프로젝트용 DB Secret
    # ═══════════════════════════════════════════
    - |
      kubectl create secret generic db-secret \
        --namespace=media \
        --from-literal=DB_HOST="mysql.database.svc.cluster.local" \
        --from-literal=DB_PORT="3306" \
        --from-literal=DB_NAME="media_db" \
        --from-literal=DB_USERNAME="user_media" \
        --from-literal=DB_PASSWORD="$MEDIA_DB_PASSWORD" \
        --dry-run=client -o yaml | kubectl apply -f -

    # ═══════════════════════════════════════════
    # Core 프로젝트용 DB Secret
    # ═══════════════════════════════════════════
    - |
      kubectl create secret generic db-secret \
        --namespace=core \
        --from-literal=DB_HOST="mysql.database.svc.cluster.local" \
        --from-literal=DB_PORT="3306" \
        --from-literal=DB_NAME="core_db" \
        --from-literal=DB_USERNAME="user_core" \
        --from-literal=DB_PASSWORD="$CORE_DB_PASSWORD" \
        --dry-run=client -o yaml | kubectl apply -f -

    # 확인
    - echo "=== Secrets 생성 완료 ==="
    - kubectl get secrets -n database
    - kubectl get secrets -n media
    - kubectl get secrets -n core
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"  # 👈 둘 다 허용
      when: manual

# ─────────────────────────────────────────────
# Stage 2: Gradle 빌드
# ─────────────────────────────────────────────
build-core:
  stage: build
  image: gradle:8-jdk21
  script:
    - cd infra/apps/core
    - gradle build -x test --no-daemon
  artifacts:
    paths:
      - infra/apps/core/build/libs/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"  # 👈 둘 다 허용    -
      changes:
        - infra/apps/core/**/*

build-media:
  stage: build
  image: gradle:8-jdk21
  script:
    - cd apps/media
    - gradle build -x test --no-daemon
  artifacts:
    paths:
      - apps/media/build/libs/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"  # 👈 둘 다 허용
      changes:
        - apps/media/**/*

# ─────────────────────────────────────────────
# Stage 3: Docker 이미지 빌드 & 푸시
# ─────────────────────────────────────────────
docker-core:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
  script:
    - docker build -t $CORE_IMAGE:$CI_COMMIT_SHORT_SHA -t $CORE_IMAGE:latest -f infra/apps/core/Dockerfile infra/apps/core
    - docker push $CORE_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CORE_IMAGE:latest
  needs:
    - job: build-core
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"  # 👈 둘 다 허용
      changes:
        - infra/apps/core/**/*

docker-media:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
  script:
    - docker build -t $MEDIA_IMAGE:$CI_COMMIT_SHORT_SHA -t $MEDIA_IMAGE:latest -f apps/media/Dockerfile apps/media
    - docker push $MEDIA_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $MEDIA_IMAGE:latest
  needs:
    - job: build-media
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"  # 👈 둘 다 허용
      changes:
        - apps/media/**/*

# ─────────────────────────────────────────────
# Stage 4: Kubernetes 배포
# ─────────────────────────────────────────────
deploy-core:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
  script:
    # 1. sed 명령어로 deployment.yaml 파일 안의 'image: ...' 부분을 이번 빌드 버전으로 바꿔치기함
    # (s|찾을문자열|바꿀문자열|g 문법 사용)
    - |
      sed -i "s|image: .*|image: $CORE_IMAGE:$CI_COMMIT_SHORT_SHA|g" infra/apps/core/deployment.yaml
      kubectl apply -f infra/apps/core/deployment.yaml -n core
      kubectl rollout status deployment/api-server -n core --timeout=300s
  needs:
    - job: docker-core
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"  # 👈 둘 다 허용
      changes:
        - infra/apps/core/**/*

deploy-media:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [ "" ]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
  script:
    # Media 앱도 똑같이 적용
    - |
      sed -i "s|image: .*|image: $MEDIA_IMAGE:$CI_COMMIT_SHORT_SHA|g" apps/media/deployment.yaml
      kubectl apply -f apps/media/deployment.yaml -n media
      kubectl rollout status deployment/api-server -n media --timeout=300s
  needs:
    - job: docker-media
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"  # 👈 둘 다 허용
      changes:
        - apps/media/**/*