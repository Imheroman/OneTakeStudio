# [핵심] 모든 작업이 'onetakestudio' 태그가 붙은 러너에서 실행되도록 설정
default:
  tags:
    - onetakestudio

stages:
  - setup        # Secret, ConfigMap 생성
  - build        # 앱 빌드
  - docker       # 이미지 빌드 & 푸시
  - deploy       # 배포

variables:
  # AWS ECR 주소 (GitLab Variables에 ECR_REGISTRY 등록 필요)
  # 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com
  CORE_IMAGE: $ECR_REGISTRY/core-server
  MEDIA_IMAGE: $ECR_REGISTRY/media-server
  DOCKER_TLS_CERTDIR: ""

# ─────────────────────────────────────────────
# Stage 1: Kubernetes Secret 생성
# ─────────────────────────────────────────────
setup-secrets:
  stage: setup
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
  script:
    # 1. Namespace 생성
    - kubectl create namespace database --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create namespace media --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create namespace core --dry-run=client -o yaml | kubectl apply -f -

    # 2. DB Password Secret 생성
    - |
      kubectl create secret generic mysql-secret \
        --namespace=database \
        --from-literal=root-password="$MYSQL_ROOT_PASSWORD" \
        --from-literal=media-password="$MEDIA_DB_PASSWORD" \
        --from-literal=core-password="$CORE_DB_PASSWORD" \
        --dry-run=client -o yaml | kubectl apply -f -

    - |
      kubectl create secret generic db-secret \
        --namespace=media \
        --from-literal=DB_HOST="mysql.database.svc.cluster.local" \
        --from-literal=DB_PORT="3306" \
        --from-literal=DB_NAME="media_db" \
        --from-literal=DB_USERNAME="user_media" \
        --from-literal=DB_PASSWORD="$MEDIA_DB_PASSWORD" \
        --dry-run=client -o yaml | kubectl apply -f -

    - |
      kubectl create secret generic db-secret \
        --namespace=core \
        --from-literal=DB_HOST="mysql.database.svc.cluster.local" \
        --from-literal=DB_PORT="3306" \
        --from-literal=DB_NAME="core_db" \
        --from-literal=DB_USERNAME="user_core" \
        --from-literal=DB_PASSWORD="$CORE_DB_PASSWORD" \
        --dry-run=client -o yaml | kubectl apply -f -

    # 3. ECR 접근용 Secret 생성 (필수! 토큰 12시간 유효)
    # bitnami 이미지엔 aws cli가 없으므로, 현재는 기존 시크릿이 있다고 가정하거나
    # EC2 호스트에서 CronJob으로 갱신하는 것을 권장합니다.
    # 만약 파이프라인에서 매번 갱신하려면 aws-cli가 포함된 이미지를 써야 합니다.

    - echo "=== Secrets 생성 완료 ==="
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "INFRA/infra"
      when: manual

# ─────────────────────────────────────────────
# Stage 2: Gradle 빌드
# ─────────────────────────────────────────────
build-core:
  stage: build
  image: gradle:8-jdk21
  script:
    - cd infra/apps/core
    - gradle build -x test --no-daemon
  artifacts:
    paths:
      - infra/apps/core/build/libs/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "INFRA/infra"
      changes:
        - infra/apps/core/**/*

build-media:
  stage: build
  image: gradle:8-jdk21
  script:
    - cd apps/media
    - gradle build -x test --no-daemon
  artifacts:
    paths:
      - apps/media/build/libs/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "INFRA/infra"
      changes:
        - infra/apps/media/**/*

# ─────────────────────────────────────────────
# Stage 3: Docker 이미지 빌드 & 푸시 (AWS ECR)
# ─────────────────────────────────────────────
docker-core:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    # AWS CLI 설치 및 ECR 로그인
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker build -t $CORE_IMAGE:$CI_COMMIT_SHORT_SHA -t $CORE_IMAGE:latest -f infra/apps/core/Dockerfile infra/apps/core
    - docker push $CORE_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CORE_IMAGE:latest
  needs:
    - job: build-core
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "INFRA/infra"
      changes:
        - infra/apps/core/**/*

docker-media:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    # AWS CLI 설치 및 ECR 로그인
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker build -t $MEDIA_IMAGE:$CI_COMMIT_SHORT_SHA -t $MEDIA_IMAGE:latest -f apps/media/Dockerfile apps/media
    - docker push $MEDIA_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $MEDIA_IMAGE:latest
  needs:
    - job: build-media
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "INFRA/infra"
      changes:
        - infra/apps/media/**/*

# ─────────────────────────────────────────────
# Stage 4: Kubernetes 배포
# ─────────────────────────────────────────────
deploy-core:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
  script:
    - |
      sed -i "s|image: .*|image: $CORE_IMAGE:$CI_COMMIT_SHORT_SHA|g" infra/apps/core/deployment.yaml
      kubectl apply -f infra/apps/core/deployment.yaml -n core
      kubectl rollout status deployment/api-server -n core --timeout=300s
  needs:
    - job: docker-core
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "INFRA/infra"
      changes:
        - infra/apps/core/**/*

deploy-media:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [ "" ]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
  script:
    - |
      sed -i "s|image: .*|image: $MEDIA_IMAGE:$CI_COMMIT_SHORT_SHA|g" apps/media/deployment.yaml
      kubectl apply -f apps/media/deployment.yaml -n media
      kubectl rollout status deployment/api-server -n media --timeout=300s
  needs:
    - job: docker-media
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "INFRA/infra"
      changes:
        - infra/apps/media/**/*