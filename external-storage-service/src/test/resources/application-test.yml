spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

storage:
  base-path: ./test-storage/files
  chunk-path: ./test-storage/chunks
  base-url: http://localhost:8090/files

security:
  enabled: false
  api-key: test-api-key

logging:
  level:
    com.onetake.storage: DEBUG
