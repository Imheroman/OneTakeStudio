server:
  port: 60000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            # Core Service Routes (쇼츠 API는 백엔드 미구현 → video-service 추가 시 별도 라우트 예정)
            - id: core-service
              uri: lb://core-service
              predicates:
                - Path=/api/auth/**, /api/users/**, /api/studios/**, /api/workspace/**, /api/notifications/**, /api/destinations/**, /api/dashboard, /api/favorites/**
              filters:
                - StripPrefix=0

            # Media Service - Publish (Media는 /api/media/publish 사용 → /api/v1/media/publish 요청을 재작성)
            - id: media-service-publish-v1
              uri: lb://media-service
              predicates:
                - Path=/api/v1/media/publish/**
              filters:
                - RewritePath=/api/v1/media/publish(?<segment>.*),/api/media/publish${segment}

            # Media Service Routes (Media 서비스는 /api/media 사용 → /api/v1/media 요청을 재작성)
            - id: media-service
              uri: lb://media-service
              predicates:
                - Path=/api/v1/media/**
              filters:
                - RewritePath=/api/v1/media(?<segment>.*),/api/media${segment}

            # Media Service - Stream Routes
            - id: media-service-stream
              uri: lb://media-service
              predicates:
                - Path=/api/streams/**
              filters:
                - RewritePath=/api/streams/(?<segment>.*), /api/v1/media/stream/${segment}

            # Media Service - Recording Routes
            - id: media-service-recording
              uri: lb://media-service
              predicates:
                - Path=/api/recordings/**
              filters:
                - RewritePath=/api/recordings/(?<segment>.*), /api/v1/media/record/${segment}

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - "Authorization"
                allowCredentials: true
                maxAge: 3600

# JWT
jwt:
  secret: b25ldGFrZXN0dWRpby1qd3Qtc2VjcmV0LWtleS1mb3ItaHMyNTYtYWxnb3JpdGhtLW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      access: read-only

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO
