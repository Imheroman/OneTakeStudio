server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Core Service Routes
        - id: core-service
          uri: lb://core-service
          predicates:
            - Path=/api/auth/**, /api/users/**, /api/studios/**
          filters:
            - StripPrefix=0

        # Media Service Routes
        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/api/v1/media/**
          filters:
            - StripPrefix=0

        # Media Service - Stream Routes
        - id: media-service-stream
          uri: lb://media-service
          predicates:
            - Path=/api/streams/**
          filters:
            - RewritePath=/api/streams/(?<segment>.*), /api/v1/media/stream/${segment}

        # Media Service - Recording Routes
        - id: media-service-recording
          uri: lb://media-service
          predicates:
            - Path=/api/recordings/**
          filters:
            - RewritePath=/api/recordings/(?<segment>.*), /api/v1/media/record/${segment}

        # Media Service - Publish Routes
        - id: media-service-publish
          uri: lb://media-service
          predicates:
            - Path=/api/publish/**
          filters:
            - RewritePath=/api/publish/(?<segment>.*), /api/v1/media/publish/${segment}

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - "Authorization"
            allowCredentials: true
            maxAge: 3600

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO
