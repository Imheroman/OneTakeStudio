server:
  port: ${SERVER_PORT:60000}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            # Core Service Routes
            - id: core-service
              uri: lb://core-service
              predicates:
                - Path=/api/auth/**, /api/users/**, /api/studios/**, /api/workspace/**, /api/notifications/**, /api/destinations/**, /api/dashboard, /api/favorites/**, /api/storage/**, /api/library/**, /api/invites/**, /api/ai/**
              filters:
                - StripPrefix=0

            # Media Service - Publish
            - id: media-service-publish
              uri: lb://media-service
              predicates:
                - Path=/api/publish/**
              filters:
                - RewritePath=/api/publish(?<segment>.*),/api/media/publish${segment}

            # Media Service - Publish v1
            - id: media-service-publish-v1
              uri: lb://media-service
              predicates:
                - Path=/api/v1/media/publish/**
              filters:
                - RewritePath=/api/v1/media/publish(?<segment>.*),/api/media/publish${segment}

            # Media Service Routes
            - id: media-service
              uri: lb://media-service
              predicates:
                - Path=/api/v1/media/**
              filters:
                - RewritePath=/api/v1/media(?<segment>.*),/api/media${segment}

            # Media Service - Stream Routes
            - id: media-service-stream
              uri: lb://media-service
              predicates:
                - Path=/api/streams/**
              filters:
                - RewritePath=/api/streams/(?<segment>.*), /api/media/stream/${segment}

            # Media Service - Chat Routes
            - id: media-service-chat
              uri: lb://media-service
              predicates:
                - Path=/api/media/chat/**
              filters:
                - StripPrefix=0

            # Media Service - Marker Routes
            - id: media-service-markers
              uri: lb://media-service
              predicates:
                - Path=/api/media/markers/**
              filters:
                - StripPrefix=0

            # Media Service - Recording Routes
            - id: media-service-recording
              uri: lb://media-service
              predicates:
                - Path=/api/recordings/**
              filters:
                - RewritePath=/api/recordings/(?<segment>.*), /api/media/record/${segment}

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - "Authorization"
                allowCredentials: true
                maxAge: 3600

# JWT (base64 encoded)
jwt:
  secret: ${JWT_SECRET:bG9jYWxkZXZqd3RzZWNyZXRrZXlmb3JoczI1NmFsZ29yaXRobW11c3RiZWF0bGVhc3QyNTZiaXRz}

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      access: read-only

# Logging
logging:
  level:
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:DEBUG}
    org.springframework.web: INFO
