apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: livekit
data:
  livekit.yaml: |
    port: 7880
    rtc:
      port_range_start: 50000
      port_range_end: 60000
      use_external_ip: true
    redis:
      address: redis.database.svc.cluster.local:6379
    logging:
      level: info
