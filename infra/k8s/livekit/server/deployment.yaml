apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-server
  namespace: livekit
  labels:
    app: livekit-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit-server
  template:
    metadata:
      labels:
        app: livekit-server
    spec:
      containers:
        - name: livekit-server
          image: livekit/livekit-server:latest
          ports:
            - containerPort: 7880
              name: http
            - containerPort: 7881
              name: rtc-tcp
          env:
            - name: LIVEKIT_KEYS
              valueFrom:
                secretKeyRef:
                  name: livekit-secret
                  key: LIVEKIT_KEYS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
          args:
            - "--config"
            - "/etc/livekit/livekit.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/livekit
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: livekit-config
