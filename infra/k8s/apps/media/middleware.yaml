# /api/publish/** -> /api/media/publish/**
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rewrite-publish
  namespace: media
spec:
  replacePathRegex:
    regex: ^/api/publish/(.*)
    replacement: /api/media/publish/$1
---
# /api/v1/media/** -> /api/media/**
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rewrite-v1-media
  namespace: media
spec:
  replacePathRegex:
    regex: ^/api/v1/media/(.*)
    replacement: /api/media/$1
---
