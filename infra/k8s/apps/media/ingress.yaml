# /api/media/** - 변환 없음
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-ingress
  namespace: media
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - i14c206.p.ssafy.io
  rules:
    - host: i14c206.p.ssafy.io
      http:
        paths:
          - path: /api/media
            pathType: Prefix
            backend:
              service:
                name: media-server
                port:
                  number: 8081
          - path: /recordings
            pathType: Prefix
            backend:
              service:
                name: media-server
                port:
                  number: 8081
---
# /api/publish/** -> /api/media/publish/**
apiVersion: networking.k8s.io/v1
