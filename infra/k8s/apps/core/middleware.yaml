# CORS 헤더 미들웨어 (www.onetakestudio.duckdns.org → i14c206.p.ssafy.io)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-headers
  namespace: core
spec:
  headers:
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "PATCH"
      - "OPTIONS"
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginListRegex:
      - "https://www\\.onetakestudio\\.duckdns\\.org"
      - "https://i14c206\\.p\\.ssafy\\.io"
    accessControlAllowCredentials: true
    accessControlMaxAge: 3600
    accessControlExposeHeaders:
      - "Authorization"
