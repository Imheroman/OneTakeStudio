apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: core
  labels:
    app: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      # [중요] setup-secrets 단계 혹은 서버에서 수동으로 만든 Secret 이름과 일치해야 함
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: api-server
          # [수정] sed 명령어가 이 줄을 덮어쓰겠지만, 명시적으로 ECR 주소를 적어두는 것이 관리상 좋습니다.
          # (나중에 sed 없이 이 파일만 보고도 어디 이미지인지 알 수 있음)
          image: 325899475975.dkr.ecr.ap-northeast-2.amazonaws.com/core-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PORT
            # [확인 필요] Spring Boot 설정파일(application.yml)에서 이 변수명을 쓰는지 확인하세요.
            # 보통은 DB_URL이나 DB_NAME을 씁니다. 만약 앱에서 DB_NAME을 기대한다면 아래 name도 DB_NAME으로 바꾸세요.
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30