apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight
  namespace: database
  labels:
    app: redisinsight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redisinsight
  template:
    metadata:
      labels:
        app: redisinsight
    spec:
      containers:
        - name: redisinsight
          image: redis/redisinsight:latest
          ports:
            - containerPort: 5540
          env:
            - name: RI_PROXY_PATH
              value: "/redis-insight"
          volumeMounts:
            - name: redisinsight-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /redis-insight/api/health
              port: 5540
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /redis-insight/api/health
              port: 5540
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redisinsight-data
          emptyDir: {}
