apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: database
data:
  redis.conf: |
    # Persistence
    appendonly yes
    appendfsync everysec
    dir /data
    
    # Memory
    maxmemory 200mb
    maxmemory-policy allkeys-lru
    
    # Security (필요시 비밀번호)
    # requirepass your-password