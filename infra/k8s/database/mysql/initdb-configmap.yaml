apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb
  namespace: database
data:
  init.sh: |
    #!/bin/bash
    # MySQL 초기화 스크립트 - core_db, media_db 생성 및 유저 권한 부여
    mysql -u root -p"$MYSQL_ROOT_PASSWORD" <<-EOSQL
      CREATE DATABASE IF NOT EXISTS core_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS media_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

      CREATE USER IF NOT EXISTS 'user_core'@'%' IDENTIFIED BY '${CORE_DB_PASSWORD}';
      GRANT ALL PRIVILEGES ON core_db.* TO 'user_core'@'%';

      CREATE USER IF NOT EXISTS 'user_media'@'%' IDENTIFIED BY '${MEDIA_DB_PASSWORD}';
      GRANT ALL PRIVILEGES ON media_db.* TO 'user_media'@'%';

      FLUSH PRIVILEGES;
    EOSQL
