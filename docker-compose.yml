version: '3.8'

services:
  # PostgreSQL (Media Service용)
  postgres:
    image: postgres:16-alpine
    container_name: onetakestudio-postgres
    environment:
      POSTGRES_DB: media_db
      POSTGRES_USER: media_user
      POSTGRES_PASSWORD: media_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onetakestudio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_user -d media_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL (Core Service용)
  mysql:
    image: mysql:8.0
    container_name: onetakestudio-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: core_db
      MYSQL_USER: core_user
      MYSQL_PASSWORD: core_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - onetakestudio-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "core_user", "-pcore_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (캐시 + Streams 메시지 브로커)
  redis:
    image: redis:7-alpine
    container_name: onetakestudio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - onetakestudio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiveKit (WebRTC 서버)
  livekit:
    image: livekit/livekit-server:latest
    container_name: onetakestudio-livekit
    command: --config /livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    networks:
      - onetakestudio-network

volumes:
  postgres_data:
  mysql_data:
  redis_data:

networks:
  onetakestudio-network:
    driver: bridge
