      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    networks:
      - onetakestudio-network

volumes:
  postgres_data:
  mysql_data:
  rabbitmq_data:
  redis_data:

