version: '3.8'

services:
  # PostgreSQL (Media ServiceьЪй)
  postgres:
    image: postgres:16-alpine
    container_name: onetakestudio-postgres
    environment:
      POSTGRES_DB: media_db
      POSTGRES_USER: media_user
      POSTGRES_PASSWORD: media_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onetakestudio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_user -d media_db"]
      interval: 10s
      timeout: 5s
      retries: 5

