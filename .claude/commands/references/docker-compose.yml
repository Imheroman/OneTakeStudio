# Docker Compose for OneTakeStudio Development

version: '3.8'

services:
  # MySQL (Core Service)
  mysql:
    image: mysql:8.0
    container_name: onetake-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: core_db
      MYSQL_USER: core_user
      MYSQL_PASSWORD: core_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - onetake-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL (Media Service)
  postgres:
    image: postgres:15
    container_name: onetake-postgres
    environment:
      POSTGRES_DB: media_db
      POSTGRES_USER: media_user
      POSTGRES_PASSWORD: media_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - onetake-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_user -d media_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ (Message Queue)
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: onetake-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - onetake-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Caching & Session)
  redis:
    image: redis:7-alpine
    container_name: onetake-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - onetake-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiveKit (WebRTC SFU Server)
  livekit:
    image: livekit/livekit-server:latest
    container_name: onetake-livekit
    ports:
      - "7880:7880"   # WebRTC
      - "7881:7881"   # TURN/STUN
      - "7882:7882"   # HTTP API
    volumes:
      - ./docker/livekit/livekit.yaml:/etc/livekit.yaml
    networks:
      - onetake-network
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx (Reverse Proxy & RTMP Server)
  nginx:
    image: tiangolo/nginx-rtmp
    container_name: onetake-nginx
    ports:
      - "80:80"       # HTTP
      - "1935:1935"   # RTMP
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - nginx_data:/var/www/html
    networks:
      - onetake-network
    depends_on:
      - livekit

  # MinIO (S3-compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: onetake-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    networks:
      - onetake-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Eureka Server (Service Discovery)
  eureka:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: onetake-eureka
    ports:
      - "8761:8761"
    networks:
      - onetake-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Config Server (Centralized Configuration)
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: onetake-config
    ports:
      - "8888:8888"
    networks:
      - onetake-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_healthy

  # Gateway Service (API Gateway)
  gateway:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: onetake-gateway
    ports:
      - "8000:8000"
    networks:
      - onetake-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_healthy
      config-server:
        condition: service_started

networks:
  onetake-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local
  nginx_data:
    driver: local
  minio_data:
    driver: local
